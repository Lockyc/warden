    <path d="M 186 126 L 270 230 L 186 334" stroke-width="18" opacity="0.26"/>
    <path d="M 208 152 L 270 230 L 208 308" stroke-width="20" opacity="0.52"/>
    <path d="M 230 178 L 270 230 L 230 282" stroke-width="26" opacity="1"/>
