<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="warden">
  <title>warden</title>
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17b0a8"/>
      <stop offset="0.55" stop-color="#0f8a8a"/>
      <stop offset="1" stop-color="#0a6f74"/>
