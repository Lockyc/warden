<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>warden</title>
    <style>
      html,body { margin:0; height:100%; font-family:system-ui; background:#1a1416; color:#f3d6d6; }
      #wrap { padding:2rem; }
      h1 { font-size:1rem; color:#e88; margin:0 0 .5rem; }
      pre { white-space:pre-wrap; color:#caa; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <h1>warden — config problem</h1>
      <pre id="msg">loading…</pre>
      <p style="color:#998">Fix the file and save — warden reloads automatically.</p>
    </div>
    <script>
      const { invoke } = window.__TAURI__.core;
      invoke('diagnostic_message').then(m => { document.getElementById('msg').textContent = m; });
    </script>
  </body>
</html>
