<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>warden</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: row;
        height: 100%;
      }
      #sidebar {
        width: 160px;
        flex: none;
        display: flex;
        flex-direction: column;
        /* Fallback bg; JS overrides with profile-colour tint */
        background: rgba(15, 138, 138, 0.10);
      }
      #sidebar-accent {
        height: 3px;
        flex: none;
        /* Fallback colour; JS sets to profile colour */
        background: #0f8a8a;
      }
      #tab-list {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 8px 6px;
        gap: 2px;
        overflow-y: auto;
      }
      .tab {
        padding: 7px 10px;
        border-radius: 5px;
        cursor: pointer;
        color: rgba(238, 238, 238, 0.65);
        font-size: 13px;
        user-select: none;
        transition: background 0.1s, color 0.1s;
      }
      .tab:hover:not(.active) {
        background: rgba(255, 255, 255, 0.07);
        color: #eef;
      }
      .tab.active {
        color: #fff;
        font-weight: 600;
      }
      #terminal-hole {
        flex: 1;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div id="sidebar-accent"></div>
        <div id="tab-list"></div>
      </aside>
      <div id="terminal-hole"></div>
    </div>
    <script>
      const { invoke } = window.__TAURI__.core;
      let profileColour = '#0f8a8a';
      let active = null;

      /** Parse a #rrggbb hex colour into an rgba(...) string. */
      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      }

      /** Report the terminal-hole's current CSS rect to the native layer. */
      function reportRect() {
        const r = document.getElementById('terminal-hole').getBoundingClientRect();
        invoke('set_hole_rect', { rect: { x: r.x, y: r.y, width: r.width, height: r.height } });
      }

      async function init() {
        const tabs = await invoke('init_tabs');
        profileColour = tabs[0]?.colour ?? '#0f8a8a';

        // Apply profile colour identity to the sidebar.
        document.getElementById('sidebar-accent').style.background = profileColour;
        document.getElementById('sidebar').style.background = hexToRgba(profileColour, 0.10);

        const list = document.getElementById('tab-list');
        tabs.forEach((t, i) => {
          const el = document.createElement('div');
          el.className = 'tab';
          el.textContent = t.title;
          el.dataset.id = t.id;
          el.onclick = () => select(t.id);
          list.appendChild(el);
          if (i === 0) active = t.id;
        });
        paint();
        // Explicit report after sidebar is fully styled and tabs rendered.
        // The ResizeObserver below is the primary anti-overlap guard; this is
        // belt-and-suspenders for the case where RO fires before init() completes.
        reportRect();
      }

      function paint() {
        document.querySelectorAll('.tab').forEach(el => {
          const isActive = el.dataset.id === active;
          el.classList.toggle('active', isActive);
          el.style.background = isActive ? hexToRgba(profileColour, 0.28) : '';
        });
      }

      async function select(id) {
        active = id;
        paint();
        // Report rect before activating — layout is stable at this point.
        reportRect();
        await invoke('activate_tab', { id });
      }

      // ResizeObserver: fires after the flex layout is calculated (including the
      // 160 px sidebar), so the first IPC carries the correct hole geometry rather
      // than the full-window rect. This is the primary guard against the startup
      // overlap where the NSView frame is set before the sidebar has been laid out.
      const ro = new ResizeObserver(() => reportRect());
      ro.observe(document.getElementById('terminal-hole'));

      window.addEventListener('resize', reportRect);
      window.addEventListener('load', init);
    </script>
  </body>
</html>
