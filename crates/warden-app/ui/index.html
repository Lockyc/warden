<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>warden</title>
    <style>
      html,body { margin:0; height:100%; background:transparent; }
      #terminal-hole { position:absolute; inset:0; background:transparent; }
    </style>
  </head>
  <body>
    <div id="terminal-hole"></div>
    <script>
      const { invoke } = window.__TAURI__.core;
      function report() {
        const r = document.getElementById('terminal-hole').getBoundingClientRect();
        invoke('set_hole_rect', { rect: { x: r.x, y: r.y, width: r.width, height: r.height } });
      }
      window.addEventListener('resize', report);
      window.addEventListener('load', report);
    </script>
  </body>
</html>
