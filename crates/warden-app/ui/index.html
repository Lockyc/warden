<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>warden</title>
    <link rel="stylesheet" href="chrome-core.css" />
    <style>
      /* Page shell only — the sidebar interior (banner, rows, dots, kill-confirm, error bar, resize)
         lives in chrome-core. This keeps warden's window topology: a native libghostty surface
         composited ABOVE the webview shows through #terminal-hole, so the sidebar is a normal DOM
         column beside a transparent hole. The window is transparent → every painted surface here
         must stay OPAQUE or it leaks the wallpaper. */
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #app { height: 100%; display: flex; flex-direction: row; }
      /* The chrome-core mount container. `padding-top` clears the traffic lights (full-size content
         view — they overlay the sidebar's top-left); chrome-core adds `.cc-root` (opaque flex
         column). Width is the density-aware token, overridden inline by the resize controller. */
      #sidebar { width: var(--cc-sidebar-w, 240px); flex: none; padding-top: 28px; }
      #terminal-hole { flex: 1; background: transparent; position: relative; }
      /* Empty-state placeholder (warden's shield mark) — shown by the controller only when no tab is
         selected, composited BEHIND the native surface (so a live tab occludes it). OPAQUE. */
      #empty-state {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: #0e1516;
        user-select: none;
        -webkit-user-select: none;
      }
      #empty-state svg { width: 160px; height: auto; opacity: 0.9; }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" data-tauri-drag-region></aside>
      <div id="terminal-hole">
        <div id="empty-state">
          <svg viewBox="108 52 296 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="no tab selected">
            <path d="M 152 72 L 360 72 Q 384 72 384 96 L 384 256 C 384 360 330 412 256 452 C 182 412 128 360 128 256 L 128 96 Q 128 72 152 72 Z"
                  fill="#283034"/>
            <g fill="none" stroke="#5c676c" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 186 126 L 270 230 L 186 334" stroke-width="18" opacity="0.3"/>
              <path d="M 208 152 L 270 230 L 208 308" stroke-width="20" opacity="0.55"/>
              <path d="M 230 178 L 270 230 L 230 282" stroke-width="26" opacity="1"/>
            </g>
            <rect x="296" y="210" width="34" height="40" rx="7" fill="#5c676c"/>
          </svg>
        </div>
      </div>
    </div>
    <script src="chrome-core.js"></script>
    <script>
      // warden's chrome controller: binds chrome-core's ChromeSidebar (the view) to warden's Tauri
      // backend + libghostty native surface. The sidebar rendering lives in chrome-core; this maps
      // callbacks→commands and events→setters, and keeps warden's content-area plumbing: the
      // native-surface hole geometry (reportRect), the empty-state placeholder, per-window event
      // filtering (forMe), and the first-probe handshake.
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      function invokeSafe(cmd, args) {
        return invoke(cmd, args).catch((err) => console.error("warden: IPC " + cmd + " failed", err));
      }

      let myLabel = null; // this window's Tauri label — emit_to leaks to siblings, so filter on it
      let sb = null;
      let activeId = null; // controller mirror of the active tab, for the empty-state placeholder
      const badges = new Set(); // tab ids with an unread notification/bell badge
      const session = new Map(); // tab id → 'on'/'off' (probe presence), for probe-enabled tabs

      const forMe = (e) => !(e.payload && e.payload.label && myLabel && e.payload.label !== myLabel);

      // Report the terminal-hole's CSS rect to the native layer so the libghostty surface tracks it.
      function reportRect() {
        const r = document.getElementById("terminal-hole").getBoundingClientRect();
        invokeSafe("set_hole_rect", { rect: { x: r.x, y: r.y, width: r.width, height: r.height } });
      }

      // The empty-state shows when no tab is selected (the hole has no surface → would leak wallpaper).
      function paintEmptyState() {
        document.getElementById("empty-state").style.display = activeId === null ? "flex" : "none";
      }
      function setActiveId(id) {
        activeId = id;
        paintEmptyState();
      }

      // Map a warden window snapshot → chrome-core's DTO. Attention (notify) + presence (probe) are
      // chrome-side state (Sets/Map), folded in here so a full update() restores them; killable +
      // warn come from the snapshot. No `active` field — warden is component-authoritative (the
      // component preserves selection + falls back to the first tab, firing onSelect to activate it).
      function toComponentDto(dto) {
        const ids = new Set(dto.tabs.map((t) => t.id));
        badges.forEach((id) => { if (!ids.has(id)) badges.delete(id); });
        session.forEach((_, id) => { if (!ids.has(id)) session.delete(id); });
        return {
          title: dto.title,
          colour: dto.colour ?? null,
          density: dto.density || "comfortable",
          tabs: dto.tabs.map((t) => ({
            id: t.id,
            title: t.title,
            group: t.group ?? null,
            live: t.spawned,
            attention: badges.has(t.id) ? true : null,
            presence: t.has_probe ? (session.get(t.id) ?? "off") : null,
            killable: !!t.has_kill,
            startable: !!t.has_cmd, // presence dot can restart a dead session by re-running `cmd`
            warn: !!t.warn,
          })),
        };
      }

      function applyDto(dto) {
        sb.update(toComponentDto(dto));
        if (!dto.tabs.length) setActiveId(null); // zero tabs → blank; the ≥1 case fires onSelect
        reportRect();
      }

      // Unload a tab (dot ✕ or ⌘W): kill its surface+PTY → cold; the native layer activates a
      // neighbour and returns its id so the highlight follows; killing the last tab leaves a blank.
      async function unloadTab(id) {
        let newActive;
        try {
          newActive = await invoke("unload_tab", { id });
        } catch (err) {
          console.error("warden: unload_tab failed", err); // PTY state unknown — leave the row as-is
          return;
        }
        sb.setLive(id, false);
        if (newActive) {
          sb.setActive(newActive);
          badges.delete(newActive);
          sb.setAttention(newActive, null); // now visible → clear its badge
          setActiveId(newActive);
        } else {
          sb.setActive(null);
          setActiveId(null);
        }
        reportRect();
      }

      async function init() {
        let dto;
        try {
          dto = await invoke("init_tabs");
        } catch (err) {
          console.error("warden: init_tabs failed", err);
          if (sb) sb.setError("⚠ failed to load window: " + err);
          return;
        }
        if (!dto) return; // diagnostic window
        myLabel = dto.label;

        sb = window.ChromeSidebar.mount(
          document.getElementById("sidebar"),
          {
            onSelect(id) {
              // Focusing a tab clears its unread badge (it's now visible).
              badges.delete(id);
              sb.setAttention(id, null);
              setActiveId(id);
              invokeSafe("activate_tab", { id });
              reportRect();
            },
            onUnload: unloadTab,
            onKill(id) {
              invokeSafe("kill_session", { id });
            },
            onStart(id) {
              // Restart a dead session: warden re-types the tab's `cmd` into the live shell, then
              // re-probes so the cyan dot lights once it's up. No optimistic paint — wait for truth.
              invokeSafe("start_session", { id });
            },
            onResize(width) {
              document.getElementById("sidebar").style.width = width + "px";
              reportRect();
            },
          },
          {
            storageKey: "warden:sidebar-width:" + myLabel,
            defaultWidth: sidebarDefault(),
            minWidth: 120,
            maxWidth: 400,
            maxFraction: 0.4,
          }
        );

        applyDto(dto);
        if (dto.error) sb.setError("⚠ " + dto.error); // a launch-time spawn failure rode in on init

        // Ask for the first probe pass only AFTER the session-state listener is registered, so the
        // first emit can't race ahead of it. This populates the presence dots at startup.
        try { await sessionListenReady; } catch (e) { /* listener still works */ }
        invokeSafe("probe_now");
      }

      // Density-aware default sidebar width, read from chrome-core's `--cc-sidebar-w` token (240
      // comfortable / 200 compact); the component's double-click reset uses this too.
      function sidebarDefault() {
        const v = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--cc-sidebar-w"), 10);
        return Number.isFinite(v) ? v : 240;
      }

      // Hot-reload: the manager pushes a fresh snapshot after a reconcile. Drop a malformed payload
      // or one addressed to a sibling window.
      listen("warden:refresh", (e) => {
        const p = e.payload;
        if (!p || !Array.isArray(p.tabs)) return;
        if (myLabel && p.label && p.label !== myLabel) return;
        applyDto(p);
      });

      // Config error banner (parse error / no-window) — now sidebar-scoped via the component. A
      // per-tab spawn error is {label,message} (own window only); a global config error is a bare
      // string shown everywhere.
      listen("warden:error", (e) => {
        const p = e.payload;
        if (p && typeof p === "object" && p.label && myLabel && p.label !== myLabel) return;
        const msg = p && typeof p === "object" ? p.message : p;
        if (sb) sb.setError("⚠ " + msg);
      });
      listen("warden:error-clear", () => { if (sb) sb.clearError(); });

      // Menu tab nav: cycle ONLY loaded tabs (⌘⇧[/]) and jump (⌘1–9). emit_to leaks → forMe filter.
      listen("warden:cycle-tab", (e) => {
        if (!forMe(e)) return;
        sb.selectByOffset(e.payload.dir, { liveOnly: true });
      });
      listen("warden:select-tab", (e) => {
        if (!forMe(e)) return;
        sb.selectByIndex(e.payload.n);
      });
      // ⌘W unloads the active tab (same as clicking its live dot).
      listen("warden:unload-tab", (e) => {
        if (!forMe(e)) return;
        if (activeId) unloadTab(activeId);
      });

      // A background tab raised a bell / OSC 9/777 while hidden — badge it (unless it's visible).
      listen("warden:notify", (e) => {
        if (!forMe(e)) return;
        const id = e.payload && e.payload.id;
        if (id && id !== activeId) {
          badges.add(id);
          sb.setAttention(id, true);
        }
      });
      // A desktop-notification banner was clicked — the native layer raised this window; select the
      // tab that fired it (which activates it + clears its badge via onSelect).
      listen("warden:focus-tab", (e) => {
        if (!forMe(e)) return;
        const id = e.payload && e.payload.id;
        if (id) sb.select(id);
      });
      // Probe results: light/clear the cyan presence dot per tab. Resolves once the backend has
      // registered this listener, so init() can await it before the first probe_now.
      const sessionListenReady = listen("warden:session-state", (e) => {
        if (!forMe(e)) return;
        const states = e.payload && e.payload.states;
        if (!states) return;
        Object.entries(states).forEach(([id, on]) => {
          session.set(id, on ? "on" : "off");
          sb.setPresence(id, on ? "on" : "off");
        });
      });

      // The terminal surface tracks the hole: re-report on any layout change, and re-clamp the
      // sidebar on window resize (a shrunk window must pull an over-wide sidebar back in).
      const ro = new ResizeObserver(() => reportRect());
      ro.observe(document.getElementById("terminal-hole"));
      window.addEventListener("resize", () => {
        const sidebar = document.getElementById("sidebar");
        const cur = parseInt(getComputedStyle(sidebar).width, 10);
        if (Number.isFinite(cur)) {
          const max = Math.min(400, window.innerWidth * 0.4);
          sidebar.style.width = Math.max(120, Math.min(cur, max)) + "px";
        }
        reportRect();
      });

      window.addEventListener("load", init);
    </script>
  </body>
</html>
