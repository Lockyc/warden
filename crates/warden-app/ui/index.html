<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>warden</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      /* Column root: the error bar (when shown) sits at the very top in normal
         flow and PUSHES #app down, so the native terminal surface reflows below
         it instead of being occluded by it (the NSView composites above the
         WKWebView, so an absolutely-positioned overlay would be hidden). */
      body {
        display: flex;
        flex-direction: column;
      }
      #error {
        flex: none;
        display: none;       /* shown on warden:error */
        /* Full-width OPAQUE bar at y=0 (no transparent gap above — wallpaper must
           not show through). The macOS traffic lights overlay its top-left, so
           the text is inset past them via padding-left; text wraps if long. */
        background: #7a1f1f;
        color: #ffd;
        padding: 6px 10px 6px 80px;
        font-size: 0.85rem;
        line-height: 1.3;
        white-space: normal;
      }
      #app {
        flex: 1;
        min-height: 0;       /* allow the row to shrink when the banner appears */
        display: flex;
        flex-direction: row;
      }
      #sidebar {
        width: 160px;
        flex: none;
        display: flex;
        flex-direction: column;
        /* Top inset clears the traffic lights, which now overlay the sidebar's
           top-left (full-size content view title bar). The banner + tabs sit below. */
        padding-top: 28px;
        /* The window drag region is wired via the `data-tauri-drag-region` HTML
           attribute on #sidebar/#banner/#tab-list (below) — macOS WKWebView
           ignores Chromium's `-webkit-app-region`, so that CSS isn't used here. */
        /* Opaque dark base (JS overrides with the profile tint composited over
           this same base). MUST stay opaque: the window is transparent so a hole
           can show the native surface — any alpha here leaks the wallpaper. */
        background: #15191e;
        /* The sidebar is chrome, not content — banner name and tab rows must not
           be text-selectable (dragging across the chrome should never start a
           selection). The terminal-hole is a native surface, unaffected by this. */
        user-select: none;
        -webkit-user-select: none;
      }
      #banner {
        flex: none;
        order: -1;          /* always first even if DOM order shifts */
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        /* Fallback colour; JS sets to the profile colour */
        background: #0f8a8a;
      }
      #tab-list {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 8px 6px;
        gap: 2px;
        overflow-y: auto;
      }
      .tab {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 5px;
        cursor: pointer;
        color: rgba(238, 238, 238, 0.65);
        font-size: 13px;
        user-select: none;
        transition: background 0.1s, color 0.1s;
      }
      .tab:hover:not(.active) {
        background: rgba(255, 255, 255, 0.07);
        color: #eef;
      }
      .tab.active {
        color: #fff;
        font-weight: 600;
      }
      /* Per-tab letter/colour tile (initial + title-hashed colour) — pure
         presentation for at-a-glance scanning; ported from curator's chrome. */
      .tab-icon {
        flex: none;
        width: 18px;
        height: 18px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 600;
        color: #fff;
      }
      .tab-title {
        flex: 1 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      /* Live/cold indicator + unload control at the row's trailing edge (curator's
         loaded-dot idiom). The visual dot is a 7px ::before centred in a 16px box
         (a comfortable hover/click target). A filled green dot = the terminal
         surface is live (keep_alive, or focused once); a hollow ring = cold (never
         opened, or unloaded — spawns fresh on next focus). Hovering a LIVE dot
         swaps it for a red ✕: clicking kills that terminal (surface + PTY). Cold
         dots are inert — nothing to kill. NB warden's unload genuinely ends the
         session (a fresh shell respawns on focus); it is not curator's cheap
         webview reload, hence it only acts on live tabs. */
      .tab-dot {
        flex: none;
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }
      .tab-dot.cold::before {
        content: '';
        width: 7px;
        height: 7px;
        border-radius: 50%;
        box-sizing: border-box;
        border: 1px solid rgba(238, 238, 238, 0.3);
      }
      .tab-dot.live {
        cursor: pointer;
      }
      .tab-dot.live::before {
        content: '';
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #3fb950;
      }
      .tab-dot.live:hover::before {
        display: none;
      }
      .tab-dot.live:hover::after {
        content: '✕';
        color: #f85149;
        font-size: 11px;
        font-weight: 700;
      }
      /* Unread/attention badge: a tab raised a terminal notification (OSC 9/777) or
         bell while it wasn't the visible tab. Amber so it reads as "needs attention"
         and stays distinct from the green live dot and the red unload ✕. Sits just
         left of the live/cold dot; cleared when you focus the tab. */
      .tab-badge {
        flex: none;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #f0883e;
      }
      #terminal-hole {
        flex: 1;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <!-- Hot-reload error banner: hidden until a parse/empty-config event lands.
         A full-width bar in NORMAL FLOW above #app — when shown it pushes #app
         (and thus the native terminal surface) down rather than overlaying it,
         since the NSView composites above the WKWebView and would occlude an
         absolute overlay. OPAQUE (#7a1f1f): the window is transparent, so any
         alpha would leak the wallpaper. Populated via textContent (never
         innerHTML) — the error string never reaches the HTML parser. -->
    <div id="error"></div>
    <div id="app">
      <!-- data-tauri-drag-region: Tauri starts a window drag when the mousedown
           target itself carries this attribute. The non-interactive sidebar
           chrome drags; .tab elements (created without it) stay clickable; the
           terminal-hole (native surface) is excluded. -->
      <aside id="sidebar" data-tauri-drag-region>
        <div id="banner" data-tauri-drag-region></div>
        <div id="tab-list" data-tauri-drag-region></div>
      </aside>
      <div id="terminal-hole"></div>
    </div>
    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      let profileColour = '#0f8a8a';
      let active = null;
      // This window's Tauri label, learned from the init DTO. Used to ignore
      // warden:refresh events addressed to a sibling window — a robust guard
      // that does not rely on emit_to's per-webview targeting.
      let myLabel = null;
      // Tab ids with an unread notification/bell badge. A Set (not just DOM state) so
      // a warden:refresh re-render restores the badges instead of dropping them.
      const badges = new Set();

      /** Opaque dark base the sidebar composites the profile tint over. Must
          match the CSS #sidebar fallback so there's no flash before JS runs. */
      const SIDEBAR_BASE = [21, 25, 30]; // #15191e

      /** First alphanumeric of a title, uppercased — the letter on the tab tile. */
      function tileInitial(s) {
        const m = (s || '').match(/[a-z0-9]/i);
        return m ? m[0].toUpperCase() : '•';
      }
      /** Deterministic tile colour hashed from the title (stable per project). */
      function tileColour(seed) {
        let h = 0;
        for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
        return 'hsl(' + (h % 360) + ', 45%, 45%)';
      }

      /** Add/remove a tab's unread badge, keeping the `badges` set in sync so a
          re-render restores it. Inserts the badge just left of the live/cold dot. */
      function setBadge(id, on) {
        if (on) badges.add(id); else badges.delete(id);
        const row = document.querySelector('.tab[data-id="' + CSS.escape(id) + '"]');
        if (!row) return;
        let b = row.querySelector('.tab-badge');
        if (on && !b) {
          b = document.createElement('span');
          b.className = 'tab-badge';
          row.insertBefore(b, row.querySelector('.tab-dot'));
        } else if (!on && b) {
          b.remove();
        }
      }

      /** Set a tab dot's live/cold class + tooltip from one source of truth, so the
          unload affordance and hover ✕ only appear on live tabs. */
      function setDotLive(dot, live) {
        dot.className = 'tab-dot ' + (live ? 'live' : 'cold');
        dot.title = live ? 'Kill this terminal (respawns on next focus)' : '';
      }

      /** Parse a #rrggbb hex colour into an rgba(...) string. */
      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      }

      /** Blend a #rrggbb colour over the opaque dark base at `ratio`, returning
          an OPAQUE rgb(...) — the sidebar must never carry alpha (transparent
          window: any alpha leaks the wallpaper through the chrome). */
      function tintOverBase(hex, ratio) {
        const c = [
          parseInt(hex.slice(1, 3), 16),
          parseInt(hex.slice(3, 5), 16),
          parseInt(hex.slice(5, 7), 16),
        ];
        const ch = i => Math.round(SIDEBAR_BASE[i] * (1 - ratio) + c[i] * ratio);
        return 'rgb(' + ch(0) + ',' + ch(1) + ',' + ch(2) + ')';
      }

      /** Report the terminal-hole's current CSS rect to the native layer. */
      function reportRect() {
        const r = document.getElementById('terminal-hole').getBoundingClientRect();
        invoke('set_hole_rect', { rect: { x: r.x, y: r.y, width: r.width, height: r.height } });
      }

      /** Render a window snapshot ({ name, colour, tabs:[{id,title,warn}] }) into
          the chrome. The single render path shared by init() (first paint) and
          the warden:refresh listener (hot-reload), so the sidebar is rebuilt the
          same way whether it's the initial DTO or a pushed reconcile snapshot. */
      function render(dto) {
        const prevActive = active;
        profileColour = dto.colour ?? '#0f8a8a';

        // Apply profile identity: banner shows the name on the profile colour;
        // the sidebar gets a faint tint of the same colour.
        const banner = document.getElementById('banner');
        banner.textContent = dto.name;
        banner.style.background = profileColour;
        // Opaque tint composited over the dark base (no alpha — see tintOverBase).
        document.getElementById('sidebar').style.background = tintOverBase(profileColour, 0.12);

        const list = document.getElementById('tab-list');
        list.innerHTML = '';
        dto.tabs.forEach((t) => {
          const el = document.createElement('div');
          el.className = 'tab';
          el.dataset.id = t.id;
          el.onclick = () => select(t.id);

          // Letter/colour tile derived from the title (no new data) — at-a-glance
          // scanning. Mirrors curator's per-row favicon tile.
          const icon = document.createElement('span');
          icon.className = 'tab-icon';
          icon.textContent = tileInitial(t.title);
          icon.style.background = tileColour(t.title);
          el.appendChild(icon);

          const title = document.createElement('span');
          title.className = 'tab-title';
          // textContent (not innerHTML): config titles never reach the HTML parser.
          title.textContent = t.title + (t.warn ? '  ⚠' : '');
          el.appendChild(title);

          // Restore an unread badge if this tab raised one while hidden (the Set
          // survives re-renders). Sits between the title and the live/cold dot.
          if (badges.has(t.id)) {
            const b = document.createElement('span');
            b.className = 'tab-badge';
            el.appendChild(b);
          }

          // Live/cold dot that doubles as the unload control. Filled if the surface
          // is already spawned (keep_alive, or focused earlier this session), a
          // hollow ring if cold. paint() upgrades the active row to live (active ⟹
          // spawned). One handler per dot, gated on the live class at click time, so
          // it still fires for a dot paint() flipped live after this render.
          const dot = document.createElement('span');
          setDotLive(dot, t.spawned);
          dot.addEventListener('click', (e) => {
            if (!dot.classList.contains('live')) return; // cold: nothing to kill
            e.stopPropagation();                          // don't also select the row
            unloadTab(t.id);
          });
          el.appendChild(dot);

          if (t.warn) el.title = 'working directory does not exist';
          list.appendChild(el);
        });
        // Keep the active tab if it survived; otherwise fall back to the first.
        if (!dto.tabs.find(t => t.id === active)) active = dto.tabs[0]?.id ?? null;
        paint();
        // Explicit report after sidebar is fully styled and tabs rendered.
        // The ResizeObserver below is the primary anti-overlap guard; this is
        // belt-and-suspenders for the case where RO fires before render completes.
        reportRect();
        // If the shown tab was removed, `active` falls back to a new tab above —
        // activate it so its surface actually shows (render otherwise only repaints
        // the highlight, leaving the registry on the closed/old surface => blank).
        // Unchanged active (e.g. a colour-only refresh) must NOT re-activate, so the
        // user's current tab is preserved.
        if (active && active !== prevActive) {
          invoke('activate_tab', { id: active });
        }
      }

      async function init() {
        // { label, name, colour, tabs:[{id,title,warn}] } | null (diagnostic window: Task 8)
        const dto = await invoke('init_tabs');
        if (!dto) return;
        myLabel = dto.label;
        render(dto);
      }

      // Hot-reload: the manager pushes a fresh snapshot to this window after a
      // reconcile Update (colour/tab add/remove/reorder) so the sidebar rebuilds.
      // Filter by label: a refresh addressed to a sibling window must be ignored
      // here, otherwise this window would relabel itself with another profile's
      // DTO (corrupting its name/colour/tabs and breaking tab clicks).
      listen('warden:refresh', (e) => {
        if (e.payload && e.payload.label && myLabel && e.payload.label !== myLabel) return;
        render(e.payload);
      });

      // Hot-reload error banner: a parse error (or empty config) on save keeps the
      // live windows up and shows the reason here; the next valid load clears it.
      // textContent (not innerHTML) — the error string never reaches the HTML parser.
      listen('warden:error', (e) => {
        const el = document.getElementById('error');
        el.textContent = '⚠ ' + e.payload;
        el.style.display = 'block';
        // The banner now occupies a top strip, shrinking #app/#terminal-hole.
        // The ResizeObserver should catch this, but report explicitly so the
        // native surface reflows BELOW the banner immediately (no occlusion).
        reportRect();
      });
      listen('warden:error-clear', () => {
        document.getElementById('error').style.display = 'none';
        // #app grows back; resize the surface to reclaim the reclaimed strip.
        reportRect();
      });

      // Tab navigation (⌘⇧[ prev, ⌘⇧] next): the app menu emits a direction (-1/+1) to THIS
      // window only (emit_to), so no label filter is needed. Cycle ONLY through LOADED (live)
      // tabs — landing on a cold tab would spawn it, which navigation must never do. A row is
      // live iff its dot carries the `live` class (the same signal the unload click gates on);
      // the active tab is always live, so it anchors the position. Step with wraparound and
      // reuse select() (same path as a click → activate_tab + highlight).
      listen('warden:cycle-tab', (e) => {
        const ids = [...document.querySelectorAll('.tab')]
          .filter(el => el.querySelector('.tab-dot.live'))
          .map(el => el.dataset.id);
        if (ids.length < 2) return; // 0 or 1 live tab — nowhere to cycle to
        const dir = e.payload < 0 ? -1 : 1;
        const cur = ids.indexOf(active);
        // Unknown active: step in from the end opposite the direction of travel.
        const base = cur === -1 ? (dir > 0 ? -1 : 0) : cur;
        const next = (base + dir + ids.length) % ids.length;
        select(ids[next]);
      });

      // Direct jump (⌘1–⌘9): the menu emits a 1-based position. Select the tab at that index;
      // a position past the last tab is a no-op (e.g. ⌘7 with only 4 tabs).
      listen('warden:select-tab', (e) => {
        const ids = [...document.querySelectorAll('.tab')].map(el => el.dataset.id);
        const n = e.payload;
        if (n >= 1 && n <= ids.length) select(ids[n - 1]);
      });

      // ⌘W unloads the active tab (the menu emits this; same action as clicking a live dot).
      listen('warden:unload-tab', () => {
        if (active) unloadTab(active);
      });

      // A tab raised an attention signal (terminal bell / OSC 9/777 desktop notification) while
      // hidden — the native layer already suppressed it for the visible tab, so just badge it.
      // Payload is the tab id.
      listen('warden:notify', (e) => {
        if (e.payload && e.payload !== active) setBadge(e.payload, true);
      });

      function paint() {
        document.querySelectorAll('.tab').forEach(el => {
          const isActive = el.dataset.id === active;
          el.classList.toggle('active', isActive);
          el.style.background = isActive ? hexToRgba(profileColour, 0.28) : '';
          // The active tab always has a live surface (activate spawns it), so its
          // dot is live even if the last DTO snapshot was captured while it was
          // still cold (e.g. a lazy tab activated by select() or render()).
          if (isActive) {
            const dot = el.querySelector('.tab-dot');
            if (dot) setDotLive(dot, true);
          }
        });
      }

      async function select(id) {
        active = id;
        setBadge(id, false); // focusing a tab clears its unread badge
        paint();
        // Report rect before activating — layout is stable at this point.
        reportRect();
        await invoke('activate_tab', { id });
      }

      /** Kill a tab's terminal (surface + PTY). The tab goes cold; clicking it again
          respawns a fresh shell (the normal lazy-spawn path). If the killed tab was
          visible, the native layer activates a neighbour and returns its id so the
          highlight follows; killing the last remaining tab leaves a blank hole. */
      async function unloadTab(id) {
        const newActive = await invoke('unload_tab', { id });
        const killed = document.querySelector('.tab[data-id="' + CSS.escape(id) + '"] .tab-dot');
        if (killed) setDotLive(killed, false);
        if (newActive) { active = newActive; setBadge(newActive, false); } // now visible → clear its badge
        else if (active === id) active = null;
        paint();      // move highlight to the neighbour; re-mark its dot live
        reportRect(); // neighbour surface (or blank) geometry
      }

      // ResizeObserver: fires after the flex layout is calculated (including the
      // 160 px sidebar), so the first IPC carries the correct hole geometry rather
      // than the full-window rect. This is the primary guard against the startup
      // overlap where the NSView frame is set before the sidebar has been laid out.
      const ro = new ResizeObserver(() => reportRect());
      ro.observe(document.getElementById('terminal-hole'));

      window.addEventListener('resize', reportRect);
      window.addEventListener('load', init);
    </script>
  </body>
</html>
