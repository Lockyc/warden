# Example warden config. `just run` loads THIS file (via WARDEN_CONFIG) so iterating on the
# app never touches your real ~/.config/warden/config.toml.
#
# A [[profile]] is a window (colour + name banner). A [[profile.tab]] is a terminal opened in
# `dir` running the `default_cmd` shell; a tab's optional `cmd` is auto-run *inside* that shell
# (typed in, not exec'd — so a shell function like agentmux's `amux` works and you drop back to a
# live shell when it exits). `keep_alive` spawns the tab at launch and keeps it running for
# background work; other tabs spawn lazily on first focus.

default_cmd = "fish -l"               # the shell every tab spawns

[[profile]]                            # a window
name   = "work"
colour = "#0f8a8a"

  # Point these at your own project dirs. The demo paths all exist on a stock macOS so
  # `just validate` stays warning-free. NOTE: tilde expansion only handles `~/…` — a bare
  # `~` is left literal and warns; write `~/Library`, not `~`.
  [[profile.tab]]
  title = "library"
  dir   = "~/Library"

  [[profile.tab]]
  title      = "logs"
  dir        = "/var/log"
  cmd        = "echo 'auto-run on open'" # optional; auto-run inside the shell when the tab spawns
  keep_alive = true                    # spawns at launch + stays live for background work

[[profile]]
name   = "play"
colour = "#b5651d"

  [[profile.tab]]
  title = "scratch"
  dir   = "/tmp"
