# Example warden config. `just run` loads THIS file (via WARDEN_CONFIG) so iterating on the
# app never touches your real ~/.config/warden/config.toml.
#
# A [[window]] is a window (colour + title banner). A [[window.tab]] is a terminal opened in
# `dir` running a `shell`; a tab's optional `cmd` is auto-run *inside* that shell (typed in, not
# exec'd — so a shell function like agentmux's `amux` works and you drop back to a live shell when
# it exits). `load_on_open` spawns the tab at launch and keeps it running for background work; other
# tabs spawn lazily on first focus.
#
# `shell`, `cmd`, and `probe` CASCADE: set them globally, per-window, or per-tab — the nearest
# level wins. A missing value inherits from above; `cmd = ""` opts a level out of an inherited cmd.
#
# Tabs can be grouped: a [[window.group]] (with a `name`) holds its own [[window.group.tab]]s and
# renders as a labelled section in the sidebar. Loose [[window.tab]]s (no group) render first, in a
# headerless section. See the "work" window below.
#
# The `dir`s point at examples/projects/ (tracked mock dirs) so this demo validates warning-free
# from the repo root. A real config uses absolute or ~/-prefixed paths to your actual projects.

shell          = "fish -l"     # global default shell for every tab
cmd            = "amux"        # global default: launch agentmux in each tab (shell stays live on exit)
format_on_save = true          # warden rewrites THIS file tidy on each save (opt-in; default off)
tab_digit_keys = "jump"        # ⌘1–⌘9 jump to tab position ("cycle" = ⌘1 next / ⌘2 prev instead)
density        = "comfortable" # chrome sizing: "comfortable" (default) or "compact" (condensed)
sidebar_drag   = true          # drag the sidebar chrome to move the window (default on; false = off)

# Per-tab "session exists" dot: warden runs this (cwd = the tab's dir) on a timer and lights a cyan
# dot when it exits 0. `amux --probe` exits 0 when the tab's amux session exists — the agent OR a
# lingering frame (so the dot stays lit if the agent exits but the frame wrapper is still up). amux
# owns the session naming + socket layout, so this stays a one-liner that can't drift from it.
# probe_interval is in seconds (0 = check on window focus / hot-reload).
#
# Name amux by ABSOLUTE path: warden runs the probe via `sh -c` with warden.app's own env, and a
# Finder/Dock-launched .app has a minimal PATH. (amux's internal `tmux` calls then resolve via
# warden's login-PATH import; under `just run` everything's on PATH anyway.) Not using agentmux?
# Point `probe` at any check that exits 0 when your session exists.
probe          = '"$HOME/.agentmux/bin/amux" --probe'
probe_interval = 5
# `kill` (optional, cascades like `probe`) runs when you confirm killing a tab's session: click the
# cyan presence dot once to arm, again to confirm. `amux --kill` tears down the WHOLE project — the
# agent session plus its frame + scratch terminal — matching everything the probe can detect. (It
# shells bare `tmux`, resolved via warden's login-PATH import; absolute paths stay the robust
# fallback.) Only reachable on a tab that also sets `probe` (no probe ⇒ no dot to click).
kill = '"$HOME/.agentmux/bin/amux" --kill'

[[window]]
  title  = "personal"
  colour = "#1f9e8a"
  [[window.tab]]
    title = "dotfiles"
    dir   = "examples/projects/personal/dotfiles"
  [[window.tab]] # cmd = "" opts out of amux → plain shell; load_on_open runs it from launch
    title        = "blog"
    dir          = "examples/projects/personal/blog"
    cmd          = ""
    load_on_open = true
  [[window.tab]] # also a plain shell (no agent) for quick notes
    title = "notes"
    dir   = "examples/projects/personal/notes"
    cmd   = ""

[[window]]
  title  = "work"
  colour = "#4063c4"
  [[window.tab]] # loose tab → renders before any group
    title        = "planning"
    dir          = "examples/projects/work/planning"
    load_on_open = true

  [[window.group]]
    name = "backend"
    [[window.group.tab]]
      title = "api"
      dir   = "examples/projects/work/api"
    [[window.group.tab]]
      title = "workers"
      dir   = "examples/projects/work/workers"

  [[window.group]]
    name = "frontend"
    [[window.group.tab]]
      title = "web"
      dir   = "examples/projects/work/web"
    [[window.group.tab]] # per-tab shell override (a toolchain that wants zsh)
      title = "mobile"
      dir   = "examples/projects/work/mobile"
      shell = "zsh"
