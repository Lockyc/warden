name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # warden-config is platform-neutral (pure logic, no macOS APIs), so its fmt/clippy/test
  # run on cheap ubuntu. fmt runs over the *whole* workspace — rustfmt is a parser, not a
  # compiler, so warden-app formats fine on Linux even though it won't COMPILE there.
  # We deliberately do NOT build/clippy/test warden-app here: it embeds a vendored,
  # macOS-only libghostty and fails to compile off macOS by design (that's the `app` job).
  config:
    name: config (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustup honours rust-toolchain.toml automatically and auto-installs the pinned
      # channel (1.96.0) on first cargo use; ensure rustfmt + clippy are present for it.
      - name: Install pinned toolchain (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check (whole workspace)
        run: cargo fmt --all --check

      - name: Clippy (warden-config)
        run: cargo clippy -p warden-config -- -D warnings

      - name: Test (warden-config)
        run: cargo test -p warden-config

  # warden-app is macOS-only: it compiles against the in-tree vendored libghostty.a.
  # The whole workspace clippy/test here is the real coverage for the app crate.
  app:
    name: app (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (workspace)
        run: cargo clippy --workspace -- -D warnings

      - name: Test (workspace)
        run: cargo test --workspace
